services:
  postgres:
    image: postgres:15-alpine
    container_name: venueos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: venueos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venueos-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/venueos_db
      JWT_SECRET: your-jwt-secret-key
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USE_MOCK_AI: ${USE_MOCK_AI:-true}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: npm run start:dev
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: venueos-frontend
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_WS_URL=ws://localhost:3000
    depends_on:
      - backend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: